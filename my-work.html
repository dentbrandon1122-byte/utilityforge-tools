<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Work | Utility Forge AI</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <meta name="description" content="View and manage your saved work in Utility Forge AI." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      overflow-x: hidden;
      line-height: 1.6;
      min-height: 100vh;
    }

    body:not(.auth-ready) .auth-sensitive {
      visibility: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.15;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 18px 40px;
      background: rgba(8, 12, 24, 0.58);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-shell {
      max-width: 1320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #f3efe4;
    }

    .top-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 8px rgba(0,255,255,0.18));
      flex-shrink: 0;
    }

    .brand-text {
      font-size: 1.7rem;
      font-weight: 800;
      color: #f3efe4;
      white-space: nowrap;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-links a,
    .nav-links button.linklike {
      text-decoration: none;
      color: rgba(255,255,255,0.86);
      font-size: 1rem;
      font-weight: 600;
      transition: color 0.2s ease, transform 0.2s ease;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .nav-links a:hover,
    .nav-links button.linklike:hover {
      color: #8df7ff;
      transform: translateY(-1px);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 14px 26px;
      border-radius: 16px;
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #0c1420;
      font-weight: 800;
      box-shadow: 0 0 18px rgba(142,241,255,0.16);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      border: none;
      cursor: pointer;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(142,241,255,0.24);
    }

    .hidden { display: none !important; }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 20px 70px;
    }

    .hero-card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 34px;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
      margin-bottom: 26px;
    }

    .hero-badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(120,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: #d8ffff;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .hero-card h1 {
      font-size: 2.8rem;
      line-height: 1.05;
      color: #f3efe4;
      margin-bottom: 10px;
    }

    .hero-card p {
      color: rgba(255,255,255,0.8);
      font-size: 1.05rem;
      max-width: 800px;
    }

    .status-box {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.84);
      font-weight: 700;
    }

    .status-box.error {
      color: #ffcbcb;
      border-color: rgba(255,140,140,0.2);
      background: rgba(255,140,140,0.05);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 24px 0 18px;
    }

    .filter-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .filter-btn.active {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #081018;
      border-color: transparent;
    }

    .results-grid {
      display: grid;
      gap: 18px;
    }

    .work-card {
      padding: 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
      backdrop-filter: blur(10px);
    }

    .work-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .work-tool {
      font-size: 1.1rem;
      font-weight: 800;
      color: #eaffff;
    }

    .work-date {
      color: rgba(255,255,255,0.62);
      font-size: 0.9rem;
    }

    .work-section-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: rgba(255,255,255,0.55);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .work-box {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .work-box.output {
      background: rgba(92,245,255,0.06);
      border-color: rgba(120,255,255,0.12);
    }

    .work-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .action-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .action-btn.secondary {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .action-btn.danger {
      background: rgba(255,120,120,0.12);
      color: #ffd6d6;
      border: 1px solid rgba(255,140,140,0.18);
    }

    .empty-state {
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 800px) {
      .site-header {
        padding: 18px 16px;
      }

      .page {
        padding: 30px 16px 60px;
      }

      .hero-card {
        padding: 24px;
      }

      .hero-card h1 {
        font-size: 2.2rem;
      }

      .top-logo {
        width: 52px;
        height: 52px;
      }

      .brand-text {
        font-size: 1.2rem;
      }

      .nav-links {
        justify-content: center;
      }

      .nav-cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <header class="site-header">
    <div class="nav-shell">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="Utility Forge AI logo" class="top-logo" />
        <span class="brand-text">Utility Forge AI</span>
      </a>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html#pricing">Pricing</a>
        <a href="my-work.html" class="auth-sensitive">My Work</a>
        <a href="login.html" id="loginLink" class="auth-sensitive">Login</a>
        <a href="signup.html" id="signupLink" class="auth-sensitive">Sign Up</a>
        <button id="logoutBtn" class="linklike hidden auth-sensitive">Logout</button>
      </nav>

      <a href="dashboard.html" class="nav-cta auth-sensitive">Open Dashboard</a>
    </div>
  </header>

  <main class="page">
    <section class="hero-card">
      <div class="hero-badge">Business workspace</div>
      <h1>My Work</h1>
      <p>
        View, reuse, and manage your saved results across tools. This feature is built for
        Business-tier workflows and ongoing projects.
      </p>
      <div id="statusBox" class="status-box">Loading saved work...</div>
    </section>

    <div class="controls" id="filterBar"></div>

    <section class="results-grid" id="resultsGrid"></section>
  </main>

  <script>
    const loginLink = document.getElementById("loginLink");
    const signupLink = document.getElementById("signupLink");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusBox = document.getElementById("statusBox");
    const resultsGrid = document.getElementById("resultsGrid");
    const filterBar = document.getElementById("filterBar");

    let historyItems = [];
    let activeFilter = "All";

    function getStoredAccount() {
      const raw = localStorage.getItem("uf_account");
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    async function hydrateSession() {
      try {
        const res = await fetch("/api/session");
        const data = await res.json();

        if (data.loggedIn && data.user) {
          localStorage.setItem("uf_account", JSON.stringify({
            id: data.user.id,
            email: data.user.email,
            name: data.user.name || "",
            pro: !!data.pro
          }));
        } else {
          localStorage.removeItem("uf_account");
        }
      } catch {
        localStorage.removeItem("uf_account");
      }
    }

    function updateAuthUI() {
      const account = getStoredAccount();
      const loggedIn = !!account?.id;

      loginLink.classList.toggle("hidden", loggedIn);
      signupLink.classList.toggle("hidden", loggedIn);
      logoutBtn.classList.toggle("hidden", !loggedIn);
    }

    async function logout() {
      try {
        await fetch("/api/logout", { method: "POST" });
      } catch {}

      localStorage.removeItem("uf_account");
      window.location.href = "index.html";
    }

    function formatDate(ts) {
      try {
        return new Date(ts).toLocaleString();
      } catch {
        return "Unknown date";
      }
    }

    function truncate(text, max = 420) {
      if (!text) return "";
      return text.length > max ? text.slice(0, max) + "..." : text;
    }

    function renderFilters() {
      const tools = ["All", ...new Set(historyItems.map(item => item.tool).filter(Boolean))];
      filterBar.innerHTML = "";

      tools.forEach((tool) => {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (tool === activeFilter ? " active" : "");
        btn.textContent = tool;
        btn.addEventListener("click", () => {
          activeFilter = tool;
          renderFilters();
          renderHistory();
        });
        filterBar.appendChild(btn);
      });
    }

    async function copyText(text, button) {
      try {
        await navigator.clipboard.writeText(text || "");
        const original = button.textContent;
        button.textContent = "Copied ✓";
        setTimeout(() => {
          button.textContent = original;
        }, 1200);
      } catch {}
    }

    async function deleteHistoryItem(id) {
      const account = getStoredAccount();
      if (!account?.id) return;

      try {
        const response = await fetch("/api/delete-history", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId: account.id,
            id
          })
        });

        const raw = await response.text();
        let data;

        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw || "Delete failed.");
        }

        if (!response.ok) {
          throw new Error(data.error || "Delete failed.");
        }

        historyItems = historyItems.filter(item => item.id !== id);
        renderFilters();
        renderHistory();

        statusBox.textContent = "Saved work updated.";
        statusBox.className = "status-box";
      } catch (error) {
        statusBox.textContent = error.message || "Failed to delete item.";
        statusBox.className = "status-box error";
      }
    }

    function renderHistory() {
      resultsGrid.innerHTML = "";

      const filtered = activeFilter === "All"
        ? historyItems
        : historyItems.filter(item => item.tool === activeFilter);

      if (!filtered.length) {
        resultsGrid.innerHTML = `
          <div class="empty-state">
            No saved work found yet for this view.
          </div>
        `;
        return;
      }

      filtered.forEach((item) => {
        const card = document.createElement("div");
        card.className = "work-card";

        card.innerHTML = `
          <div class="work-top">
            <div>
              <div class="work-tool">${item.tool || "Saved Result"}</div>
              <div class="work-date">${formatDate(item.createdAt)}</div>
            </div>
          </div>

          <div class="work-section-label">Input</div>
          <div class="work-box">${truncate(item.input || "No input saved.")}</div>

          <div class="work-section-label">Output</div>
          <div class="work-box output">${truncate(item.output || "No output saved.", 900)}</div>

          <div class="work-actions">
            <button class="action-btn secondary copy-output">Copy Output</button>
            <button class="action-btn secondary copy-input">Copy Input</button>
            <button class="action-btn danger delete-item">Delete</button>
          </div>
        `;

        const copyOutputBtn = card.querySelector(".copy-output");
        const copyInputBtn = card.querySelector(".copy-input");
        const deleteBtn = card.querySelector(".delete-item");

        copyOutputBtn.addEventListener("click", () => copyText(item.output || "", copyOutputBtn));
        copyInputBtn.addEventListener("click", () => copyText(item.input || "", copyInputBtn));
        deleteBtn.addEventListener("click", () => deleteHistoryItem(item.id));

        resultsGrid.appendChild(card);
      });
    }

    async function loadHistory() {
      const account = getStoredAccount();

      if (!account?.id) {
        statusBox.textContent = "Sign in with a Business-enabled account to view saved work.";
        statusBox.className = "status-box error";
        resultsGrid.innerHTML = `
          <div class="empty-state">
            You need to sign in to access saved work.
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(`/api/get-history?userId=${encodeURIComponent(account.id)}`);
        const raw = await response.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw || "Invalid history response.");
        }

        if (!response.ok) {
          throw new Error(data.error || "Unable to load saved work.");
        }

        historyItems = Array.isArray(data.history) ? data.history : [];
        statusBox.textContent = historyItems.length
          ? `Loaded ${historyItems.length} saved item${historyItems.length === 1 ? "" : "s"}.`
          : "No saved work yet. Save results from any tool to build your workspace.";
        statusBox.className = "status-box";

        renderFilters();
        renderHistory();
      } catch (error) {
        statusBox.textContent = error.message || "Unable to load saved work.";
        statusBox.className = "status-box error";
        resultsGrid.innerHTML = `
          <div class="empty-state">
            Could not load saved work right now.
          </div>
        `;
      }
    }

    logoutBtn.addEventListener("click", logout);

    (async function init() {
      await hydrateSession();
      updateAuthUI();
      await loadHistory();
      document.body.classList.add("auth-ready");
    })();
  </script>
</body>
</html>
