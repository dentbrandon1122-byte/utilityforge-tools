<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgrade Successful | Utility Forge AI</title>

  <link rel="icon" href="logo.png" type="image/png" />
  <meta
    name="description"
    content="Your Utility Forge AI Pro upgrade is being confirmed."
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      overflow-x: hidden;
      line-height: 1.6;
      min-height: 100vh;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 255, 0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.15;
    }

    .background::after {
      content: "";
      position: absolute;
      width: 850px;
      height: 850px;
      left: 50%;
      top: 30%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0, 255, 255, 0.07), transparent 65%);
      filter: blur(42px);
      opacity: 0.35;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      position: relative;
      z-index: 2;
    }

    .success-card {
      width: 100%;
      max-width: 760px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 34px rgba(0, 255, 255, 0.05),
        inset 0 0 24px rgba(255, 255, 255, 0.018);
      backdrop-filter: blur(12px);
      padding: 38px 34px;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .success-card::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(95, 244, 255, 0.14), transparent 68%);
      filter: blur(10px);
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .status-badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(120, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      color: #d8ffff;
      font-size: 14px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 2;
    }

    .success-icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #0c1420;
      font-size: 2rem;
      font-weight: 900;
      box-shadow: 0 0 24px rgba(142, 241, 255, 0.2);
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: 3rem;
      line-height: 1.02;
      margin-bottom: 16px;
      color: #f3efe4;
      letter-spacing: -1px;
      position: relative;
      z-index: 2;
    }

    .title .accent {
      color: #92ffb8;
      text-shadow: 0 0 14px rgba(146, 255, 184, 0.12);
    }

    .subtitle {
      max-width: 640px;
      margin: 0 auto 18px;
      font-size: 1.08rem;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.84);
      position: relative;
      z-index: 2;
    }

    .status-line {
      min-height: 28px;
      font-size: 0.98rem;
      font-weight: 700;
      color: #d8ffff;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .status-line.success {
      color: #92ffb8;
    }

    .status-line.soft {
      color: rgba(255,255,255,0.74);
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }

    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 15px 26px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 800;
      transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #0c1420;
      box-shadow: 0 0 18px rgba(142, 241, 255, 0.16);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(142, 241, 255, 0.24);
    }

    .btn-secondary {
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: white;
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 700px) {
      .success-card {
        padding: 28px 20px;
        border-radius: 24px;
      }

      .title {
        font-size: 2.2rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .action-row {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <main class="page">
    <section class="success-card">
      <div class="status-badge">Upgrade confirmed</div>

      <div class="success-icon">✓</div>

      <h1 class="title">
        Welcome to <span class="accent">Pro</span>
      </h1>

      <p class="subtitle">
        Your upgrade was successful. We’re confirming your access now so your
        dashboard and tool pages can switch over to unlimited usage.
      </p>

      <div id="statusLine" class="status-line soft">Checking your Pro access…</div>

      <div class="action-row">
        <a href="dashboard.html" class="btn-primary">Open Dashboard</a>
        <a href="index.html" class="btn-secondary">Back to Home</a>
      </div>
    </section>
  </main>

  <script>
    function getUserId() {
      let id = localStorage.getItem("uf_user_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("uf_user_id", id);
      }
      return id;
    }

    async function confirmProAccess() {
      const statusLine = document.getElementById("statusLine");
      const params = new URLSearchParams(window.location.search);
      const userIdFromUrl = params.get("userId");
      const userId = userIdFromUrl || getUserId();

      let confirmed = false;

      for (let i = 0; i < 6; i++) {
        try {
          const res = await fetch(`/api/pro-status?userId=${encodeURIComponent(userId)}`);
          const raw = await res.text();
          const data = JSON.parse(raw);

          if (data.pro) {
            confirmed = true;
            break;
          }
        } catch (error) {}

        await new Promise(resolve => setTimeout(resolve, 1200));
      }

      if (confirmed) {
        localStorage.setItem("uf_pro_hint", "true");
        statusLine.textContent = "Pro access confirmed. Redirecting to your dashboard…";
        statusLine.className = "status-line success";
      } else {
        statusLine.textContent = "Payment received. Finalizing access and redirecting…";
        statusLine.className = "status-line soft";
      }

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1500);
    }

    confirmProAccess();
  </script>
</body>
</html>
