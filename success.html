<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgrade Successful | Utility Forge AI</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <meta name="description" content="Your Utility Forge AI Pro upgrade is being confirmed." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.15;
    }

    .card {
      width: min(680px, calc(100% - 32px));
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 38px 30px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(137,247,200,0.18), rgba(142,241,255,0.18));
      border: 1px solid rgba(142,241,255,0.25);
      color: #dcffff;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 2.4rem;
      color: #f3efe4;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      color: #b8ffcf;
      font-weight: 700;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #081018;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="card">
    <div class="badge">Pro Upgrade Successful</div>
    <h1>Welcome to Pro</h1>
    <p>
      Your account is being updated now. Once confirmed, your tools will show
      unlimited usage across the platform.
    </p>

    <div class="status" id="status">Confirming your Pro access...</div>

    <div class="actions">
      <a href="dashboard.html" class="btn primary">Go to Dashboard</a>
      <a href="index.html" class="btn secondary">Back to Home</a>
    </div>
  </div>

  <script>
    function getUserId() {
      let id = localStorage.getItem("uf_user_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("uf_user_id", id);
      }
      return id;
    }

    async function verifyPro() {
      const status = document.getElementById("status");
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const userId = params.get("userId") || getUserId();

      if (!sessionId) {
        status.textContent = "Upgrade detected. Redirecting to your dashboard...";
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
        return;
      }

      let success = false;

      for (let i = 0; i < 6; i++) {
        try {
          const res = await fetch(`/api/pro-status?userId=${encodeURIComponent(userId)}`);
          const raw = await res.text();
          const data = JSON.parse(raw);

          if (data.pro) {
            success = true;
            break;
          }
        } catch {}

        await new Promise(resolve => setTimeout(resolve, 1200));
      }

      if (success) {
        localStorage.setItem("uf_pro_hint", "true");
        status.textContent = "Pro access confirmed. Redirecting...";
      } else {
        status.textContent = "Payment received. Finalizing access and redirecting...";
      }

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1400);
    }

    verifyPro();
  </script>
</body>
</html>
