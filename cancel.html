<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Canceled | Utility Forge AI</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <meta name="description" content="Your Utility Forge AI checkout was canceled." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }

    .card {
      width: min(680px, calc(100% - 32px));
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 38px 30px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 2.2rem;
      color: #f3efe4;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #081018;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="card">
    <h1>Checkout Canceled</h1>
    <p>
      No worries — your current access is unchanged. You can keep using the free
      version and upgrade anytime when you're ready.
    </p>

    <div class="actions">
      <a href="dashboard.html" class="btn primary">Go to Dashboard</a>
      <a href="index.html#pricing" class="btn secondary">See Pricing Again</a>
    </div>
  </div>
</body>
</html>
