<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text Summarizer | Utility Forge AI</title>
<link rel="icon" href="logo.png" />

<style>
/* SAME STYLE AS EMAIL POLISHER (DO NOT CHANGE) */
body { font-family: Arial; background:#0b1020; color:white; }
.card { max-width:900px; margin:60px auto; padding:30px; border-radius:20px;
background:rgba(255,255,255,0.05); }
textarea { width:100%; min-height:200px; }
button { padding:12px 18px; border-radius:10px; }
</style>
</head>

<body>

<div class="card">
<h1>Text Summarizer</h1>

<textarea id="input"></textarea>

<br><br>

<button onclick="run()">Summarize</button>

<h3>Result</h3>
<div id="result"></div>
</div>

<script>
function getUserId(){
  let id = localStorage.getItem("uf_user_id");
  if(!id){ id = crypto.randomUUID(); localStorage.setItem("uf_user_id", id); }
  return id;
}

async function run(){
  const text = document.getElementById("input").value;

  const res = await fetch("/api/summarize", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text, userId:getUserId() })
  });

  const data = await res.json();
  document.getElementById("result").textContent = data.result || data.error;
}
</script>

</body>
</html>
