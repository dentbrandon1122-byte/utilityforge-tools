<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Utility Forge AI</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <meta name="description" content="Login to Utility Forge AI." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .background {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }
    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.15;
    }
    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 34px;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #f3efe4;
      margin-bottom: 22px;
    }
    .top-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(0,255,255,0.18));
    }
    .brand-text {
      font-size: 1.55rem;
      font-weight: 800;
      color: #f3efe4;
    }
    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(120,255,255,0.18);
      background: rgba(255,255,255,0.04);
      color: #d8ffff;
      font-size: 14px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 2.3rem;
      color: #f3efe4;
      margin-bottom: 8px;
    }
    p.sub {
      color: rgba(255,255,255,0.78);
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-weight: 800;
      color: #dcffff;
      margin-bottom: 10px;
      font-size: 0.98rem;
    }
    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: white;
      outline: none;
      font-size: 15px;
    }
    input:focus {
      border-color: rgba(142,241,255,0.55);
      box-shadow: 0 0 0 1px rgba(142,241,255,0.2);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button, .secondary-link {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary-btn {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #081018;
    }
    .secondary-link {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status {
      min-height: 24px;
      margin: 16px 0 8px;
      color: rgba(255,255,255,0.76);
      font-weight: 700;
    }
    .status.error { color: #ffb4b4; }
    .status.success { color: #92ffb8; }
    .footer-link {
      margin-top: 18px;
      color: rgba(255,255,255,0.78);
    }
    .footer-link a {
      color: #8ef1ff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <main class="page">
    <section class="card">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="Utility Forge AI logo" class="top-logo" />
        <span class="brand-text">Utility Forge AI</span>
      </a>

      <div class="badge">Account access</div>
      <h1>Login</h1>
      <p class="sub">Sign in to keep your usage, Pro access, and tools connected to your account.</p>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <div class="actions">
        <button id="loginBtn" class="primary-btn">Login</button>
        <a class="secondary-link" href="index.html">Back Home</a>
      </div>

      <div id="status" class="status"></div>

      <div class="footer-link">
        Need an account? <a href="signup.html">Create one</a>
      </div>
    </section>
  </main>

  <script>
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("status");

    function setStatus(message = "", type = "") {
      statusBox.textContent = message;
      statusBox.className = "status" + (type ? ` ${type}` : "");
    }

    async function saveSessionToLocalStorage() {
      const res = await fetch("/api/session");
      const data = await res.json();

      if (data.loggedIn && data.user) {
        localStorage.setItem("uf_account", JSON.stringify({
          id: data.user.id,
          email: data.user.email,
          name: data.user.name || "",
          pro: !!data.pro
        }));
      }
    }

    loginBtn.addEventListener("click", async () => {
      setStatus("");

      if (!email.value.trim() || !password.value.trim()) {
        setStatus("Enter your email and password.", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: email.value.trim(),
            password: password.value
          })
        });

        const raw = await res.text();
        const data = JSON.parse(raw);

        if (!res.ok) {
          setStatus(data.error || "Login failed.", "error");
          return;
        }

        await saveSessionToLocalStorage();
        setStatus("Login successful. Redirecting...", "success");
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 500);
      } catch (error) {
        setStatus(error.message || "Login failed.", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
