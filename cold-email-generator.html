<!DOCTYPE html>
<html>
<head>
<title>Cold Email Generator</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

textarea{
width:100%;
height:200px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#6366f1;
color:white;
border:none;
}

#result{
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Cold Email Generator</h1>

<textarea id="input" placeholder="Describe your outreach goal"></textarea>

<button onclick="generate()">Generate Email</button>

<div id="result"></div>

<script>

async function generate(){

const text=document.getElementById("input").value;

const res=await fetch("/api/cold-email",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text})
});

const data=await res.json();

document.getElementById("result").innerText=data.result;

}

</script>

</body>
</html>
