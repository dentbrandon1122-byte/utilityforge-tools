<!DOCTYPE html>
<html>
<head>
<title>Idea Generator | Utility Forge AI</title>
<link rel="icon" href="logo.png" />
</head>

<body style="background:#0b1020;color:white;font-family:Arial;">

<div style="max-width:800px;margin:60px auto;">
<h1>Idea Generator</h1>

<input id="topic" placeholder="Enter topic..." style="width:100%;padding:12px;"/>

<br><br>

<button onclick="run()">Generate Ideas</button>

<h3>Ideas</h3>
<div id="result"></div>
</div>

<script>
function getUserId(){
  let id = localStorage.getItem("uf_user_id");
  if(!id){ id = crypto.randomUUID(); localStorage.setItem("uf_user_id", id); }
  return id;
}

async function run(){
  const topic = document.getElementById("topic").value;

  const res = await fetch("/api/ideas", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ topic, userId:getUserId() })
  });

  const data = await res.json();
  document.getElementById("result").textContent = data.result || data.error;
}
</script>

</body>
</html>
