<!-- COPY your email-polisher.html -->
<!-- Then ONLY replace the run fetch call below -->

<script>
runBtn.addEventListener("click", async () => {
  const text = inputText.value.trim();

  if (!text) {
    resultBox.textContent = "Enter something first.";
    return;
  }

  runBtn.disabled = true;
  resultBox.textContent = "Generating ideas...";

  try {
    const res = await fetch(API_ROUTE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, userId: getUserId() })
    });

    const data = await res.json();

    if (!res.ok) {
      resultBox.textContent = data.error;
      if (data.error.includes("limit")) showUpgradeHint();
      return;
    }

    resultBox.textContent = data.result;
    lastOutput = data.result;
    copyBtn.disabled = false;

    setUsageUI(data);
  } catch (e) {
    resultBox.textContent = "Error generating ideas.";
  } finally {
    runBtn.disabled = false;
  }
});
</script>
