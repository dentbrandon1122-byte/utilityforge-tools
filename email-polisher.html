<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Polisher | Utility Forge AI</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <meta name="description" content="Improve wording, tone, and clarity for rough emails." />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #fff;
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.06), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.06), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1326 100%);
    }

    .background::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.15;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 42px 20px 60px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #b8ffcf;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .back-link:hover { color: #8ef1ff; }

    .card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 34px;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
    }

    .title {
      text-align: center;
      font-size: 2.6rem;
      color: #f3efe4;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.78);
      margin-bottom: 28px;
      font-size: 1.05rem;
    }

    .examples-label,
    .field-label,
    .result-label {
      font-weight: 800;
      color: #dcffff;
      margin-bottom: 10px;
      display: block;
      font-size: 0.98rem;
    }

    .examples {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .example-chip {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #f0fcff;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.88rem;
      transition: .18s ease;
    }

    .example-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(142,241,255,0.35);
      background: rgba(142,241,255,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 18px;
      align-items: start;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: white;
      padding: 16px;
      font-size: 16px;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.45);
    }

    textarea:focus, select:focus {
      border-color: rgba(142,241,255,0.55);
      box-shadow: 0 0 0 1px rgba(142,241,255,0.2);
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      font-size: 15px;
    }

    select option {
      background: #0d1326;
      color: white;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.76);
      margin: 12px 0 18px;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .primary-btn {
      background: linear-gradient(90deg, #89f7c8, #8ef1ff);
      color: #081018;
    }

    .primary-btn:hover { transform: translateY(-1px); }

    .secondary-btn {
      background: rgba(255,255,255,0.06);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .secondary-btn:hover { background: rgba(255,255,255,0.09); }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .result-box {
      min-height: 190px;
      background: rgba(92,245,255,0.06);
      border: 1px solid rgba(120,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
      white-space: pre-wrap;
      color: rgba(255,255,255,0.92);
    }

    .tip {
      margin-top: 8px;
      color: rgba(255,255,255,0.66);
      font-size: 0.9rem;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .title { font-size: 2rem; }
      .card { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <main class="page">
    <a href="workspace.html" class="back-link">← Back to workspace</a>

    <section class="card">
      <h1 class="title">Email Polisher</h1>
      <p class="subtitle">Turn rough emails into cleaner, more professional messages.</p>

      <label class="examples-label">Quick start examples</label>
      <div class="examples" id="examples"></div>

      <div class="grid">
        <div>
          <label for="inputText" class="field-label">Email draft</label>
          <textarea id="inputText" maxlength="1500" placeholder="Paste your rough email here..."></textarea>
        </div>

        <div>
          <label for="toneSelect" class="field-label">Tone</label>
          <select id="toneSelect">
            <option value="professional">Professional</option>
            <option value="friendly">Friendly</option>
            <option value="confident">Confident</option>
            <option value="concise">Concise</option>
          </select>
        </div>
      </div>

      <div class="meta-row">
        <div><span id="charCount">0</span>/1500 characters</div>
        <div id="usageText">Free uses left today: ...</div>
      </div>

      <div class="actions">
        <button id="runBtn" class="primary-btn">Improve Email</button>
        <button id="copyBtn" class="secondary-btn" disabled>Copy Result</button>
        <button id="clearBtn" class="secondary-btn">Clear</button>
      </div>

      <label class="result-label">Polished Email</label>
      <div class="result-box" id="resultBox">Your polished email will appear here.</div>
      <div class="tip">Tip: rough drafts with clear context usually polish best.</div>
    </section>
  </main>

  <script>
    const examples = [
      "Hi Sarah, I wanted to follow up on my application and see if there are any updates. Thank you.",
      "Hi team, can we set up a time next week to review the project and next steps?",
      "Hi Mr. Johnson, thank you for taking the time to speak with me today."
    ];

    const examplesWrap = document.getElementById("examples");
    const inputText = document.getElementById("inputText");
    const toneSelect = document.getElementById("toneSelect");
    const charCount = document.getElementById("charCount");
    const usageText = document.getElementById("usageText");
    const runBtn = document.getElementById("runBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resultBox = document.getElementById("resultBox");
    let lastOutput = "";

    function getUserId() {
      let id = localStorage.getItem("uf_user_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("uf_user_id", id);
      }
      return id;
    }

    function updateCount() {
      charCount.textContent = inputText.value.length;
    }

    async function loadUsage() {
      try {
        const res = await fetch(`/api/usage-status?userId=${encodeURIComponent(getUserId())}&tool=email`);
        const raw = await res.text();
        const data = JSON.parse(raw);
        usageText.textContent = `Free uses left today: ${data.remaining}`;
      } catch {
        usageText.textContent = "Usage unavailable";
      }
    }

    examples.forEach(example => {
      const btn = document.createElement("button");
      btn.className = "example-chip";
      btn.type = "button";
      btn.textContent = example.length > 28 ? example.slice(0, 28) + "..." : example;
      btn.title = example;
      btn.onclick = () => {
        inputText.value = example;
        updateCount();
      };
      examplesWrap.appendChild(btn);
    });

    inputText.addEventListener("input", updateCount);

    clearBtn.addEventListener("click", () => {
      inputText.value = "";
      resultBox.textContent = "Your polished email will appear here.";
      copyBtn.disabled = true;
      lastOutput = "";
      updateCount();
    });

    copyBtn.addEventListener("click", async () => {
      if (!lastOutput) return;
      try {
        await navigator.clipboard.writeText(lastOutput);
        copyBtn.textContent = "Copied ✓";
        setTimeout(() => copyBtn.textContent = "Copy Result", 1400);
      } catch {
        copyBtn.textContent = "Copy failed";
        setTimeout(() => copyBtn.textContent = "Copy Result", 1400);
      }
    });

    runBtn.addEventListener("click", async () => {
      const text = inputText.value.trim();
      const tone = toneSelect.value;

      if (!text) {
        resultBox.textContent = "Please enter an email draft first.";
        return;
      }

      runBtn.disabled = true;
      copyBtn.disabled = true;
      runBtn.textContent = "Improving...";
      resultBox.textContent = "Polishing your email...";

      try {
        const res = await fetch("/api/email-polish", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, tone, userId: getUserId() })
        });

        const raw = await res.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error(raw || "Server returned an invalid response.");
        }

        if (!res.ok) {
          resultBox.textContent = "Error: " + (data.error || "Something went wrong.");
          await loadUsage();
          return;
        }

        lastOutput = data.result || "";
        resultBox.textContent = lastOutput || "No result returned.";
        copyBtn.disabled = !lastOutput;
        await loadUsage();
      } catch (error) {
        resultBox.textContent = "Error: " + error.message;
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = "Improve Email";
      }
    });

    updateCount();
    loadUsage();
  </script>
</body>
</html>
